################################# Working settings  #################################
# LLM override: use DeepSeek official API to avoid 500 errors from proxy
llm:
  api_type: "openai"
  base_url: "https://api.chatanywhere.tech/v1"
  model: "gemini-2.5-flash-lite"
  api_key: "sk-CaEcKGX1G9nsji15RDYNtXrZ9ZjfoAzwKlbsucjMqUPbGqsn"

# Basic Config
use_entities_vdb: True
use_relations_vdb: True  # Only set True for LightRAG, ToG and GR
llm_model_max_token_size: 32768
use_entity_link_chunk: False  # Only set True for HippoRAG and FastGraphRAG
enable_graph_augmentation: False

# Data
index_name: er_graph
vdb_type: vector  # vector/colbert

# Chunk Config
chunk:
  chunk_token_size: 1200
  chunk_overlap_token_size: 100
  token_model: gpt-3.5-turbo
  chunk_method: chunking_by_token_size

# Graph Config
graph:
  # enable LightRAG
    enable_edge_keywords: True
    graph_type: er_graph # rkg_graph/er_graph/tree_graph/passage_graph
    force: False  # True=й–Іе¶…зј“й–«зҠІжөҳ(з»ҫ?зҒҸеҝ”жӨӮ); False=йҚ”зҠәжөҮе®ёеҸүж№Ғ er_graphй”ӣеұҪеҪ§з’әжҲ еӮЁеҜ®?йҸҢгғЁоҮ—
    # Building graph
    extract_two_step: True
    max_gleaning: 1
    enable_entity_description: False
    enable_entity_type: False
    enable_edge_description: False
    enable_edge_name: True

# Retrieval Config
retriever:
    query_type: gr
    enable_local: False
    use_entity_similarity_for_ppr: False
    node_specificity: False
    # GRй”ӣе ўжҡҗжҫ§зӮІгҒҮз»үе¶…з“ҷзҖ№зӮ°з¶ӢйҸҒеё®зҙқжёҡеӨёз°¬ PCST зҖӣж„¬жөҳз‘•е—ҷжҙҠз»ӣж—Җо”Қйҗ©зЁҝеҸ§й‘әеӮңеҒЈй”ӣ?    top_k: 4
    use_relations_vdb: True

query:
    query_type: qa
    only_need_context: False
    enable_hybrid_query: True
    augmentation_ppr: False
    response_type: short-form
    # GR
    entities_max_tokens: 2000
    relationships_max_tokens: 2000

    # G-Retriever GRй”ӣеқўax_txt_len жқ©еӣ§зҡ¬жөјж°ӯеҹ…йҸӮо…һз“ҷйҚҘ?CSVй”ӣеұҫжЁүй’ҒжӨҫжҝҖ PopQA йҚ‘е—ҷвҖҳйҗңеӣ·зҙҡ
    top_k: 4
    max_txt_len: 1024
    topk_e: 3
    cost_e: 0.5