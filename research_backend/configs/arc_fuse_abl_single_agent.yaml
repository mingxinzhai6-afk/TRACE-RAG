################################################################################
# ARC-Fuse_abl_single_agent.yaml - Horizontal ablation: Full ARC-Fuse with 1 judge/voter
################################################################################

llm:
  api_type: "openai"
  base_url: "https://api.openai.com/v1"
  model: "gemini-2.5-flash-lite"
  api_key: "SET_VIA_ARC_FUSE_API_KEY"

embedding:
  api_type: "hf"
  model: "BAAI/bge-small-en-v1.5"
  cache_folder: ""
  embed_batch_size: 64

graph_hipporag:
  index_name: er_graph_colbert
  vdb_type: faiss
  use_entities_vdb: True
  use_relations_vdb: False
  use_entity_link_chunk: True
  enable_graph_augmentation: False
  graph:
    enable_edge_keywords: False
    graph_type: er_graph
    force: False
    extract_two_step: True
    max_gleaning: 1
    enable_entity_description: False
    enable_entity_type: False
    enable_edge_description: False
    enable_edge_name: True
    prior_prob: 0.8
    similarity_max: 1.0
  retriever:
    query_type: ppr
    enable_local: False
    use_entity_similarity_for_ppr: False
    top_k_entity_for_ppr: 8
    node_specificity: True
    damping: 0.1
    top_k: 5
  query:
    query_type: qa
    only_need_context: False
    response_type: short-form
    enable_hybrid_query: True
    augmentation_ppr: False
    level: 2
    community_information: True
    top_k: 20
    naive_max_token_for_text_unit: 12000
    local_max_token_for_text_unit: 4000
    entities_max_tokens: 2000
    relationships_max_tokens: 2000
    max_ir_steps: 2

graph_tog:
  index_name: er_graph
  vdb_type: vector
  use_entities_vdb: True
  use_relations_vdb: True
  use_entity_link_chunk: False
  enable_graph_augmentation: False
  graph:
    enable_edge_keywords: True
    graph_type: er_graph
    force: False
    extract_two_step: True
    max_gleaning: 1
    enable_entity_description: False
    enable_entity_type: False
    enable_edge_description: False
    enable_edge_name: True
  retriever:
    query_type: tog
    enable_local: False
    use_entity_similarity_for_ppr: False
    node_specificity: False
    top_k: 3
  query:
    query_type: qa
    only_need_context: False
    enable_hybrid_query: True
    augmentation_ppr: False
    response_type: short-form
    entities_max_tokens: 2000
    relationships_max_tokens: 2000
    width: 3
    depth: 3

graph_raptor:
  index_name: tree_graph_balanced
  vdb_type: faiss
  use_entities_vdb: True
  use_relations_vdb: False
  use_entity_link_chunk: False
  enable_graph_augmentation: False
  graph:
    enable_edge_keywords: False
    graph_type: tree_graph
    force: False
    build_tree_from_leaves: False
    reduction_dimension: 10
    summarization_length: 100
    num_layers: 5
    top_k: 5
    start_layer: 5
    selection_mode: top_k
    max_length_in_cluster: 3500
    threshold: 0.1
    cluster_metric: cosine
    verbose: False
    random_seed: 224
    threshold_cluster_num: 5000
    enforce_sub_communities: False
    max_size_percentage: 0.2
    tol: 1e-4
    max_iter: 10
    size_of_clusters: 10
  retriever:
    query_type: basic
    enable_local: False
    top_k: 5
  query:
    query_type: qa
    only_need_context: False
    enable_hybrid_query: True
    augmentation_ppr: True
    response_type: short-form
    level: 2
    community_information: True
    retrieve_top_k: 20
    naive_max_token_for_text_unit: 12000
    local_max_token_for_text_unit: 4000
    max_token_for_text_unit: 4000
    use_keywords: True
    tree_search: True
    entities_max_tokens: 2000
    relationships_max_tokens: 2000

text_bm25:
  top_k: 10

text_vdb:
  top_k: 10

# ===== Horizontal ablation: Full ARC-Fuse with single judge/voter =====
arc_fuse:
  n_judges: 1
  n_voters: 1
  max_rounds: 3
  use_routing: true
  use_regen: true
  use_critic: true
  use_commendor: true
  use_normalizer: true
  use_disambiguation: true
  judge_score_threshold: 3.0
  critic_use_normalized_answer: true
  use_last_resort_guess: false
  top_k_fusion: 10

use_entities_vdb: True
use_relations_vdb: False
use_subgraphs_vdb: False
llm_model_max_token_size: 32768
chunk:
  chunk_token_size: 1200
  chunk_overlap_token_size: 100
  token_model: gpt-3.5-turbo
  chunk_method: chunking_by_token_size

